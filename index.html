<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Alchemy Souls: Portfolio Edition</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        h1 { margin: 10px 0 2px 0; text-align: center; font-size: 22px; letter-spacing: 1px; }
        p { margin: 0 0 10px 0; text-align: center; color: #888; font-size: 13px; }
        
        .game-container { display: flex; flex: 1; height: calc(100vh - 60px); position: relative; }
        #workspace { flex: 1; background: #1a1a1a; position: relative; overflow: hidden; border-right: 3px solid #252525; }
        #workspace::before { content: "Перетащите элементы сюда"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #2a2a2a; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 0; }
        
        /* Боковая панель с поиском */
        #sidebar { width: 280px; background: #1e1e1e; display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,0.7); }
        .sidebar-header { padding: 15px 10px; border-bottom: 2px solid #2a2a2a; text-align: center; }
        .sidebar-header h3 { margin: 0 0 10px 0; font-size: 16px; color: #00ffd2; }
        #search-box { width: 90%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #121212; color: #fff; font-size: 14px; outline: none; }
        #search-box:focus { border-color: #00ffd2; }
        
        #inventory { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: start; }
        
        /* Кнопка сброса прогресса */
        .reset-btn { background: #ff4a4a; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; margin-top: 8px; transition: 0.2s; }
        .reset-btn:hover { background: #cc3333; }

        /* Стили элементов */
        .item { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 100px; height: 110px; background: #262626; border: 2px solid #383838; border-radius: 8px; cursor: grab; user-select: none; z-index: 1; }
        .item:hover { border-color: #555; background: #2d2d2d; }
        .item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 6px; pointer-events: none; background: rgba(0,0,0,0.3); border-radius: 4px; }
        .item span { font-size: 11px; font-weight: bold; text-align: center; padding: 0 4px; pointer-events: none; word-break: break-word; }
        .item.on-desk { position: absolute; z-index: 10; margin: 0; background: #2d2d2d; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Всплывающее окно художника (Модалка) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 16px; max-width: 450px; width: 90%; text-align: center; border: 2px solid #00ffd2; box-shadow: 0 0 25px rgba(0, 255, 210, 0.2); position: relative; transform: scale(0.8); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .modal-art { width: 100%; max-height: 280px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background: #121212; }
        .modal-name { font-size: 24px; font-weight: bold; margin: 10px 0; color: #fff; }
        .modal-desc { color: #aaa; font-size: 14px; margin-bottom: 20px; line-height: 1.4; }
        .modal-link { display: inline-block; background: #00ffd2; color: #121212; text-decoration: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 255, 210, 0.4); }
        .modal-link:hover { background: #00cca8; transform: translateY(-2px); }
        .close-modal { position: absolute; top: 12px; right: 15px; color: #888; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: #fff; }
    </style>
</head>
<body>
    <h1>Alchemy Souls: Artists Edition</h1>
    <p>Соединяйте стили и концепты, чтобы открыть портфолио потрясающих художников!</p>
    
    <div class="game-container">
        <div id="workspace"></div>
        
        <div id="sidebar">
            <div class="sidebar-header">
                <h3>Открыто элементов</h3>
                <input type="text" id="search-box" placeholder="Поиск художника или стиля...">
                <button class="reset-btn" onclick="resetGame()">Сбросить прогресс</button>
            </div>
            <div id="inventory"></div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div class="modal-overlay" id="artist-modal" onclick="closeModal(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('artist-modal').classList.remove('active')">&times;</span>
            <img src="" alt="Art" class="modal-art" id="m-art">
            <div class="modal-name" id="m-name">Имя Художника</div>
            <div class="modal-desc" id="m-desc">Описание или ключевые стили автора.</div>
            <a href="#" target="_blank" class="modal-link" id="m-link">Смотреть Портфолио</a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
