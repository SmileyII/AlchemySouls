<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Алхимия Душ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .container { display: flex; justify-content: space-around; margin-top: 20px; }
        .panel { width: 45%; background: white; padding: 20px; border-radius: 8px; min-height: 300px; }
        .item { display: inline-block; padding: 10px; margin: 5px; background: #007bff; color: white; border-radius: 5px; cursor: pointer; }
        .item.selected { background: #ffc107; color: black; }
    </style>
</head>
<body>
    <h1>Алхимия: Свои Элементы</h1>
    <p>Выберите два элемента для соединения:</p>
    <div class="container">
        <div class="panel" id="inventory"><h3>Открытые элементы</h3></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
